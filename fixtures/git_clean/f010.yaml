id: f010
description: Dry-run with directory removal preview
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'tracked' > tracked.txt
- git add tracked.txt
- git commit -m 'Initial commit'
- mkdir -p artifacts/logs
- echo 'log' > artifacts/logs/run.log
- echo 'untracked' > scratch.txt
prompt: Preview what untracked files and directories would be removed without actually
  removing them. Output ONLY the git command, nothing else.
expected: git clean -f -d -n
scoring:
  type: state_assertions
  expected_state:
    assertions:
    - type: file_exists
      path: scratch.txt
    - type: file_exists
      path: artifacts/logs/run.log
    - type: file_exists
      path: tracked.txt
purpose: Tests ability to preview directory removal with dry-run. Evaluates combined
  flag usage (-nd).
difficulty: easy
tags:
- git-clean
- dry-run
- directories
- preview
