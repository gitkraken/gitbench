id: f008
description: "Remove untracked files with interactive mode confirmation"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'tracked' > tracked.txt"
  - "git add tracked.txt"
  - "git commit -m 'Initial commit'"
  - "echo 'junk1' > junk1.txt"
  - "echo 'junk2' > junk2.txt"
  - "mkdir -p builddir"
  - "echo 'obj' > builddir/out.o"
prompt: "Remove all untracked files and directories non-interactively (force mode). Output ONLY the git command, nothing else."
expected: "git clean -f -d"
scoring:
  type: state_assertions
  expected_state:
    assertions:
      - type: file_not_exists
        path: "junk1.txt"
      - type: file_not_exists
        path: "junk2.txt"
      - type: dir_not_exists
        path: "builddir"
      - type: file_exists
        path: "tracked.txt"
