id: f010
description: "Count merge commits"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'base' > file.txt"
  - "git add file.txt"
  - "git commit -m 'Initial commit'"
  - "git checkout -b feature-a"
  - "echo 'a' > a.txt"
  - "git add a.txt"
  - "git commit -m 'Feature A'"
  - "git checkout master || git checkout main"
  - "git merge feature-a -m 'Merge feature-a'"
  - "git checkout -b feature-b"
  - "echo 'b' > b.txt"
  - "git add b.txt"
  - "git commit -m 'Feature B'"
  - "git checkout master || git checkout main"
  - "git merge feature-b -m 'Merge feature-b'"
  - "git checkout -b feature-c"
  - "echo 'c' > c.txt"
  - "git add c.txt"
  - "git commit -m 'Feature C'"
  - "git checkout master || git checkout main"
  - "git merge feature-c -m 'Merge feature-c'"
  - "echo 'post' > post.txt"
  - "git add post.txt"
  - "git commit -m 'Post-merge commit'"
prompt: "How many merge commits exist in this repository? Use git log --merges to count them. Output ONLY the number, nothing else."
expected: "3"
scoring:
  type: exact_match
