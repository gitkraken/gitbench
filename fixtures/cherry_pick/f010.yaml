id: f010
description: "Multi-file: conflicts in both main.py and utils.py"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "printf 'def main():\n    print(\"Running\")' > main.py"
  - "printf 'DEBUG = True\nPORT = 8000' > utils.py"
  - "git add main.py utils.py"
  - "git commit -m 'Initial code'"
  - "git checkout -b feature"
  - "printf 'def main():\n    print(\"Running v2\")' > main.py"
  - "printf 'DEBUG = False\nPORT = 8000' > utils.py"
  - "git add main.py utils.py"
  - "git commit -m 'Feature: update main and disable debug'"
  - "git checkout main"
  - "printf 'def main():\n    print(\"Running enterprise\")' > main.py"
  - "printf 'DEBUG = True\nPORT = 9000' > utils.py"
  - "git add main.py utils.py"
  - "git commit -m 'Enterprise: update main and port'"
  - "git cherry-pick feature"
prompt: "Resolve the cherry-pick conflicts in main.py and utils.py. For main.py: the cherry-picked commit set 'Running v2' but main has 'Running enterprise'. Prefer 'Running v2' from the cherry-pick. For utils.py: the cherry-picked commit set DEBUG=False while keeping PORT=8000, but main has DEBUG=True and PORT=9000. Keep DEBUG=False from the cherry-picked commit. Provide ONLY the two resolved file contents, separated by a blank line, with each file prefixed by its filename."
expected: |
  main.py:
  def main():
      print("Running v2")

  utils.py:
  DEBUG = False
  PORT = 9000
scoring:
  type: similarity
  threshold: 0.5
