id: f005
description: "Multi-line hunk: function body conflict"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "printf 'def greet(name):\n    print(\"Hello\")\n    return True' > greet.py"
  - "git add greet.py"
  - "git commit -m 'Initial greet'"
  - "git checkout -b feature"
  - "printf 'def greet(name):\n    print(f\"Hello, {name}\")\n    return True' > greet.py"
  - "git add greet.py"
  - "git commit -m 'Add name parameter'"
  - "git checkout main"
  - "printf 'def greet(name):\n    print(\"Hi there\")\n    return False' > greet.py"
  - "git add greet.py"
  - "git commit -m 'Change greeting'"
  - "git cherry-pick feature"
prompt: "Resolve the cherry-pick conflict in greet.py. The cherry-picked commit (feature) added f-string formatting with a name parameter and kept return True. However, main (the current HEAD) changed the greeting to \"Hi there\" and return to False. Keep the f-string parameter addition from the cherry-picked commit. Provide ONLY the resolved file content."
expected: |
  def greet(name):
      print(f"Hello, {name}")
      return True
scoring:
  type: similarity
  threshold: 0.5
