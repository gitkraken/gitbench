id: f005
description: 'Multi-line hunk: function body conflict'
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- "printf 'def greet(name):\n    print(\"Hello\")\n    return True' > greet.py"
- git add greet.py
- git commit -m 'Initial greet'
- git checkout -b feature
- "printf 'def greet(name):\n    print(f\"Hello, {name}\")\n    return True' > greet.py"
- git add greet.py
- git commit -m 'Add name parameter'
- git checkout main
- "printf 'def greet(name):\n    print(\"Hi there\")\n    return False' > greet.py"
- git add greet.py
- git commit -m 'Change greeting'
- git cherry-pick $(git rev-parse feature)
prompt: Resolve the cherry-pick conflict in greet.py. The base was a simple greet
  with print("Hello"). The incoming commit added f-string formatting with the name
  parameter. The current branch changed the greeting text to "Hi there" and changed
  return to False. Resolve by taking the incoming name-aware greeting and keeping the
  successful return value; do not take the current branch's greeting text or False
  return. Provide ONLY the resolved file content.
expected: "def greet(name):\n    print(f\"Hello, {name}\")\n    return True\n"
scoring:
  type: exact_match
  strip_fences: true
  order_matters: true
purpose: Tests ability to resolve a function-body conflict combining formatting changes
  from both branches. Evaluates semantic merging of code logic.
difficulty: medium
tags:
- cherry-pick
- conflict-resolution
- function-body
- code-merge
