id: f002
description: "Single-line version number conflict"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'VERSION=1.0.0' > version.txt"
  - "git add version.txt"
  - "git commit -m 'Initial version'"
  - "git checkout -b release"
  - "echo 'VERSION=2.0.0' > version.txt"
  - "git add version.txt"
  - "git commit -m 'Bump major version'"
  - "git checkout main"
  - "echo 'VERSION=1.1.0' > version.txt"
  - "git add version.txt"
  - "git commit -m 'Bump minor version'"
  - "git cherry-pick release"
prompt: "Resolve the cherry-pick conflict in version.txt. The cherry-picked commit (release) set VERSION=2.0.0. But main (the current HEAD) has already set VERSION=1.1.0. The feature branch represents the official release. Prefer the release version. Provide ONLY the resolved file content."
expected: "VERSION=2.0.0"
scoring:
  type: similarity
  threshold: 0.5
