id: f012
description: 'Multi-file: conflicts in app.py and requirements.txt simultaneously'
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- 'printf ''app = Flask(__name__)

  app.run(port=5000)'' > app.py'
- 'printf ''flask==2.0.0

  requests==2.25.0'' > requirements.txt'
- git add app.py requirements.txt
- git commit -m 'Initial app'
- git checkout -b security
- 'printf ''app = Flask(__name__)

  app.run(port=5000, debug=False)'' > app.py'
- 'printf ''flask==2.0.0

  requests==2.28.0'' > requirements.txt'
- git add app.py requirements.txt
- 'git commit -m ''Security: disable debug and update requests'''
- git checkout main
- 'printf ''app = Flask(__name__)

  app.run(port=8080)'' > app.py'
- 'printf ''flask==3.0.0

  requests==2.25.0'' > requirements.txt'
- git add app.py requirements.txt
- git commit -m 'Upgrade to Flask 3 and change port'
- git cherry-pick $(git rev-parse security)
prompt: 'Resolve the cherry-pick conflicts in app.py and requirements.txt. For app.py:
  the incoming commit disabled debug while keeping port 5000, the current branch (main)
  changed port to 8080 while keeping debug enabled. For requirements.txt: the incoming
  commit updated requests to 2.28.0 keeping flask 2.0.0, the current branch upgraded
  flask to 3.0.0 keeping requests 2.25.0. For app.py prefer disabling debug. For requirements.txt
  prefer keeping the older flask version for compatibility but take the updated requests.
  Provide ONLY the resolved contents for both app.py and requirements.txt, with each
  file prefixed by its filename.'
expected: "app.py:\napp = Flask(__name__)\n\napp.run(port=8080, debug=False)\n\nrequirements.txt:\nflask==2.0.0\n\nrequests==2.28.0\n"
scoring:
  type: resolved_file_blocks
  expected_files:
    app.py: |
      app = Flask(__name__)

      app.run(port=8080, debug=False)
    requirements.txt: |
      flask==2.0.0

      requests==2.28.0
output_schema: resolved_file_blocks
purpose: Tests ability to resolve conflicts in two interdependent files (app.py +
  requirements.txt) with trade-off decisions. Evaluates complex dependency-aware merging.
difficulty: hard
tags:
- cherry-pick
- conflict-resolution
- multi-file
- dependency-management
