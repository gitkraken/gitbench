id: f001
description: "Single-line greeting conflict"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'Hello, World!' > greeting.txt"
  - "git add greeting.txt"
  - "git commit -m 'Initial greeting'"
  - "git checkout -b feature"
  - "echo 'Hello, World!!!' > greeting.txt"
  - "git add greeting.txt"
  - "git commit -m 'Add excitement'"
  - "git checkout main"
  - "echo 'Hello, Planet!' > greeting.txt"
  - "git add greeting.txt"
  - "git commit -m 'Update greeting'"
  - "git cherry-pick feature"
prompt: "Resolve the cherry-pick conflict in greeting.txt. The base (parent of picked commit) had 'Hello, World!'. The cherry-picked commit (feature) changed it to 'Hello, World!!!'. However, main (the current HEAD) has already changed greeting.txt to 'Hello, Planet!'. Resolve the conflict preferring the more enthusiastic greeting. Provide ONLY the resolved file content."
expected: "Hello, Planet!!!"
scoring:
  type: similarity
  threshold: 0.5
