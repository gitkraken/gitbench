id: f001
description: Single-line greeting conflict
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'Hello, World!' > greeting.txt
- git add greeting.txt
- git commit -m 'Initial greeting'
- git checkout -b feature
- echo 'Hello, World!!!' > greeting.txt
- git add greeting.txt
- git commit -m 'Add excitement'
- git checkout main
- echo 'Hello, Planet!' > greeting.txt
- git add greeting.txt
- git commit -m 'Update greeting'
- git cherry-pick $(git rev-parse feature)
prompt: Resolve the cherry-pick conflict in greeting.txt. The base version was 'Hello,
  World!'. The incoming commit changed it to 'Hello, World!!!'. The current branch
  has 'Hello, Planet!'. Provide ONLY the resolved file content, nothing else.
expected: Hello, Planet!!!
scoring:
  type: similarity
  threshold: 0.5
purpose: Tests ability to resolve a simple single-line cherry-pick conflict in a greeting
  file. Evaluates basic conflict marker understanding and merge strategy.
difficulty: easy
tags:
- cherry-pick
- conflict-resolution
- single-line
- basic
