id: f008
description: "Single-line: greeting conflict where both change the same line to different values"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "printf 'def main():\n    print(\"Running\")' > main.py"
  - "git add main.py"
  - "git commit -m 'Initial code'"
  - "git checkout -b feature"
  - "printf 'def main():\n    print(\"Running v2\")' > main.py"
  - "git add main.py"
  - "git commit -m 'Feature: update message'"
  - "git checkout main"
  - "printf 'def main():\n    print(\"Running enterprise\")' > main.py"
  - "git add main.py"
  - "git commit -m 'Enterprise: update message'"
  - "git cherry-pick feature"
prompt: "Resolve the cherry-pick conflict in main.py. The cherry-picked commit (feature) set the message to 'Running v2'. However, main (the current HEAD) has already set it to 'Running enterprise'. Prefer the more specific version from the cherry-picked commit. Provide ONLY the resolved file content."
expected: |
  def main():
      print("Running v2")
scoring:
  type: similarity
  threshold: 0.5
