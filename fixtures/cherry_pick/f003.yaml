id: f003
description: "Single-line status message conflict"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'Status: OK' > status.txt"
  - "git add status.txt"
  - "git commit -m 'Initial status'"
  - "git checkout -b fix"
  - "echo 'Status: Resolved' > status.txt"
  - "git add status.txt"
  - "git commit -m 'Fix status'"
  - "git checkout main"
  - "echo 'Status: Failed' > status.txt"
  - "git add status.txt"
  - "git commit -m 'Update status'"
  - "git cherry-pick fix"
prompt: "Resolve the cherry-pick conflict in status.txt. The cherry-picked commit (fix) set 'Status: Resolved'. But main (the current HEAD) has already updated it to 'Status: Failed'. The fix branch represents the approved resolution. Prefer the fix. Provide ONLY the resolved file content."
expected: "Status: Resolved"
scoring:
  type: similarity
  threshold: 0.5
