id: f007
description: 'Three-way: conflicting port and protocol settings in same line range'
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- 'printf ''PORT=8080

  PROTOCOL=http'' > config.txt'
- git add config.txt
- git commit -m 'Initial config'
- git checkout -b branch-a
- 'printf ''PORT=8443

  PROTOCOL=https'' > config.txt'
- git add config.txt
- git commit -m 'Use HTTPS port'
- git checkout main
- 'printf ''PORT=9090

  PROTOCOL=http'' > config.txt'
- git add config.txt
- git commit -m 'Change to non-standard port'
- git cherry-pick $(git rev-parse branch-a)
prompt: Resolve the cherry-pick conflict in config.txt. The base PORT was 8080/PROTOCOL=http.
  The incoming commit changed both to PORT=8443/PROTOCOL=https. The current branch
  (main) has PORT=9090/PROTOCOL=http. Prefer the HTTPS configuration when there is
  a conflict. Provide ONLY the resolved config.txt content.
expected: 'PORT=8443

  PROTOCOL=https

  '
scoring:
  type: resolved_file_blocks
  expected_files:
    config.txt: |
      PORT=8443
      PROTOCOL=https
purpose: Tests ability to resolve a three-way conflict with port and protocol settings.
  Evaluates preference-based conflict resolution with multiple configuration dimensions.
difficulty: hard
tags:
- cherry-pick
- conflict-resolution
- three-way
- port
- protocol
