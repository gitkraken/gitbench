id: f009
description: 'Three-way: author line with three different values'
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- 'echo ''Author: John'' > author.txt'
- git add author.txt
- git commit -m 'Initial author'
- git checkout -b fullname
- 'echo ''Author: John Smith'' > author.txt'
- git add author.txt
- git commit -m 'Use full name'
- git checkout main
- 'echo ''Author: J. Doe'' > author.txt'
- git add author.txt
- git commit -m 'Use initials'
- git cherry-pick $(git rev-parse fullname)
prompt: 'Resolve the cherry-pick conflict in author.txt. The base was ''Author: John''.
  The incoming commit (fullname branch) changed it to ''Author: John Smith''. The
  current branch (main) has ''Author: J. Doe''. Keep the current branch value. Provide
  ONLY the resolved file content.'
expected: 'Author: J. Doe'
scoring:
  type: resolved_file_blocks
  expected_files:
    author.txt: |-
      Author: J. Doe
purpose: Tests ability to resolve a three-way author-name conflict where base, incoming,
  and current all differ. Evaluates complex multi-value merge decisions.
difficulty: medium
tags:
- cherry-pick
- conflict-resolution
- three-way
- author
