id: f009
description: "Three-way: author line with three different values"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'Author: John' > author.txt"
  - "git add author.txt"
  - "git commit -m 'Initial author'"
  - "git checkout -b fullname"
  - "echo 'Author: John Smith' > author.txt"
  - "git add author.txt"
  - "git commit -m 'Use full name'"
  - "git checkout main"
  - "git checkout -b initials"
  - "echo 'Author: J. Doe' > author.txt"
  - "git add author.txt"
  - "git commit -m 'Use initials'"
  - "git checkout main"
  - "git merge initials"
  - "git cherry-pick fullname"
prompt: "Resolve the cherry-pick conflict in author.txt. The cherry-picked commit (fullname) set 'Author: John Smith'. However, main (the current HEAD) has 'Author: J. Doe' (from a previously merged initials branch). Prefer the full name from the cherry-picked commit. Provide ONLY the resolved file content."
expected: "Author: John Smith"
scoring:
  type: similarity
  threshold: 0.5
