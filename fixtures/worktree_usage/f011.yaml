id: f011
description: Unlock a worktree
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'Hello' > hello.txt
- git add hello.txt
- git commit -m 'Initial commit'
- git checkout -b feature
- echo 'Feature' > feature.txt
- git add feature.txt
- git commit -m 'Add feature'
- git checkout main
- git worktree add ../feature-wt feature
- git worktree lock ../feature-wt
prompt: Unlock the worktree at '../feature-wt'. Output ONLY the git command, nothing
  else.
expected: git worktree unlock ../feature-wt
scoring:
  type: state_assertions
  expected_state:
    assertions:
    - type: git_output
      command: git worktree list --porcelain
      not_contains: locked
purpose: Tests ability to unlock a previously locked worktree. Evaluates worktree-unlock
  workflow.
difficulty: medium
tags:
- worktree
- unlock
- lifecycle
