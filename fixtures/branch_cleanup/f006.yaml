id: f006
description: Mixed naming conventions
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'init' > init.txt
- git add init.txt
- git commit -m 'Init'
- git checkout -b bugfix-123
- echo 'fix' > fix.txt
- git add fix.txt
- git commit -m 'Fix bug 123'
- git checkout main
- git merge bugfix-123
- git checkout -b feature/search
- echo 'search' > search.py
- git add search.py
- git commit -m 'Add search'
- git checkout main
- git merge feature/search
- git checkout -b experiment-ml
- echo 'ml' > ml.py
- git add ml.py
- git commit -m 'ML experiment'
- git checkout main
prompt: Look at the branches in this repository. Which branches should be deleted
  because they are fully merged into main? List ONLY the branch names to delete, one
  per line. If none, respond with 'none'.
expected: 'bugfix-123

  feature/search'
scoring:
  type: exact_match
purpose: Tests ability to handle mixed branch naming conventions (feature/, bugfix/,
  hotfix/) when identifying merged branches.
difficulty: medium
tags:
- branch-management
- naming-conventions
- merged-branches
- cleanup
