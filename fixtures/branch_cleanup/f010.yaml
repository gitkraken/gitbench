id: f010
description: Release branches
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'v1' > version.txt
- git add version.txt
- git commit -m 'v1.0'
- git checkout -b release-1.0
- echo 'v1.0' > release.txt
- git add release.txt
- git commit -m 'Release 1.0'
- git checkout main
- git merge release-1.0
- git checkout -b release-2.0
- echo 'v2.0' > release.txt
- git add release.txt
- git commit -m 'Release 2.0'
- git checkout main
prompt: Look at the branches in this repository. Which branches should be deleted
  because they are fully merged into main? List ONLY the branch names to delete, one
  per line. If none, respond with 'none'.
expected: release-1.0
scoring:
  type: exact_match
purpose: Tests ability to identify merged release branches for cleanup. Evaluates
  release-branch lifecycle management.
difficulty: medium
tags:
- branch-management
- release-branches
- merged-branches
- cleanup
