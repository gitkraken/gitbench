id: f005
description: Hotfix branch merged
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'v1.0' > version.txt
- git add version.txt
- git commit -m 'Release v1.0'
- git checkout -b hotfix-security
- echo 'v1.0.1-patched' > version.txt
- git add version.txt
- git commit -m 'Security patch'
- git checkout main
- git merge hotfix-security
- git checkout -b release-v2
- echo 'v2.0-dev' > version.txt
- git add version.txt
- git commit -m 'Start v2.0'
- git checkout main
prompt: Look at the branches in this repository. Which branches should be deleted
  because they are fully merged into main? List ONLY the branch names to delete, one
  per line. If none, respond with 'none'.
expected: hotfix-security
scoring:
  type: exact_match
purpose: Tests ability to identify a merged hotfix branch. Evaluates recognition of
  hotfix naming conventions in branch cleanup.
difficulty: easy
tags:
- branch-management
- hotfix
- merged-branches
- cleanup
