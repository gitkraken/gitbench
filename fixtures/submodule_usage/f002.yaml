id: f002
description: Initialize submodules after clone
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'App' > app.txt
- git add app.txt
- git commit -m 'Initial commit'
- mkdir -p ../lib-src && cd ../lib-src && git init && git config user.email 'test@test.com'
  && git config user.name 'Test User' && echo 'lib code' > lib.py && git add lib.py
  && git commit -m 'Initial lib'
- git clone --bare ../lib-src ../lib-bare
- git config protocol.file.allow always
- git -c protocol.file.allow=always submodule add ../lib-bare lib
- git add .gitmodules lib
- git commit -m 'Add lib submodule'
- rm -rf lib
prompt: The submodule directory 'lib' was removed. Run the commands to re-initialize
  and update the submodule. Output ONLY the commands to run, one per line.
expected: 'git submodule init

  git submodule update'
scoring:
  type: state_assertions
  expected_state:
    assertions:
    - type: dir_exists
      path: lib
    - type: file_content
      path: lib/lib.py
      value: lib code
purpose: Tests ability to initialize submodules after cloning a repository. Evaluates
  understanding of submodule clone workflow.
difficulty: medium
tags:
- submodule
- init
- clone
- workflow
