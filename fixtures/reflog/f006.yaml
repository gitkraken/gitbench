id: f006
description: Detached HEAD state - identify the detached HEAD commit
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'line1' > data.txt
- git add data.txt
- git commit -m 'First commit'
- echo 'line2' >> data.txt
- git add data.txt
- git commit -m 'Second commit'
- echo 'line3' >> data.txt
- git add data.txt
- git commit -m 'Third commit - WIP experimental'
- git checkout HEAD~1
prompt: You are in detached HEAD state at HEAD~1. You made some experimental changes
  and committed them in a detached HEAD state. The commit 'Third commit - WIP experimental'
  was made on a detached HEAD. Use git reflog to find the commit hash of that experimental
  commit so you can return to it.
expected: Third commit - WIP experimental
scoring:
  type: reflog_recovery
  threshold: 0.5
purpose: Tests ability to identify a detached HEAD commit using reflog. Evaluates
  detached-HEAD diagnosis and recovery.
difficulty: medium
tags:
- reflog
- detached-head
- diagnosis
- recovery
