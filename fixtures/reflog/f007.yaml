id: f007
description: Multiple consecutive resets - find the most recent lost commit
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'a' > letters.txt"
  - "git add letters.txt"
  - "git commit -m 'Commit A'"
  - "echo 'b' >> letters.txt"
  - "git add letters.txt"
  - "git commit -m 'Commit B'"
  - "echo 'c' >> letters.txt"
  - "git add letters.txt"
  - "git commit -m 'Commit C - hotfix for login'"
  - "echo 'd' >> letters.txt"
  - "git add letters.txt"
  - "git commit -m 'Commit D'"
  - "git reset --hard HEAD~2"
prompt: "You ran 'git reset --hard HEAD~2' which moved HEAD back two commits. You now want to recover the most recent commit that was lost, which had 'hotfix for login' in its message. Use git reflog to find the full commit hash you need."
expected: "Commit C - hotfix for login"
scoring:
  type: reflog_recovery
  threshold: 0.5
