id: f008
description: Stash with untracked files
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'Initial' > file.txt
- git add file.txt
- git commit -m 'Initial'
- echo 'Tracked work' > file.txt
- git add file.txt
- echo 'New file' > new.txt
- git stash -u -m 'all-my-changes'
prompt: You stashed both tracked and untracked files with message 'all-my-changes'.
  Which stash entry contains this work? Provide the stash reference.
expected: stash@{0}
scoring:
  type: stash_recovery
  threshold: 0.5
purpose: Tests ability to identify a stash containing untracked files. Evaluates understanding
  of stash -u option implications.
difficulty: medium
tags:
- stash
- untracked
- include-untracked
- recovery
