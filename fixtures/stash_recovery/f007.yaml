id: f007
description: Dropped stash - identify index
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'Initial' > file.txt"
  - "git add file.txt"
  - "git commit -m 'Initial'"
  - "echo 'Stashed' > file.txt"
  - "git stash"
  - "echo 'Other work' > file.txt"
  - "git stash"
prompt: "You have two stashes: one with 'Other work' (newer) and one with 'Stashed' (older). Which stash contains 'Stashed'? Provide the stash reference."
expected: "stash@{1}"
scoring:
  type: similarity
  threshold: 0.5
