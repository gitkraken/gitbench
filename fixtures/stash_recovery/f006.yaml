id: f006
description: Multiple files stashed
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'Initial' > file1.txt"
  - "echo 'Initial' > file2.txt"
  - "git add file1.txt file2.txt"
  - "git commit -m 'Initial'"
  - "echo 'Work A' > file1.txt"
  - "echo 'Work B' > file2.txt"
  - "git stash push -m 'important-work'"
  - "echo 'Done' > file1.txt"
  - "echo 'Done' > file2.txt"
  - "git add file1.txt file2.txt"
  - "git commit -m 'Done'"
prompt: "You stashed 'important-work' containing changes to file1.txt and file2.txt. Which stash entry contains this work? Provide the stash reference."
expected: "stash@{0}"
scoring:
  type: similarity
  threshold: 0.5
