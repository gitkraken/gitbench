id: f012
description: Stash with branch name in message
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- git checkout -b my-feature-branch
- echo 'Initial' > file.txt
- git add file.txt
- git commit -m 'Initial'
- echo 'Feature work' > file.txt
- git stash -m 'feature-on-my-feature-branch'
- echo 'Main work' > file.txt
- git add file.txt
- git commit -m 'Main work'
prompt: You were on 'my-feature-branch' and stashed 'Feature work' with message 'feature-on-my-feature-branch'.
  Which stash entry contains this work? Provide the stash reference.
expected: stash@{0}
scoring:
  type: stash_recovery
  threshold: 0.5
purpose: Tests ability to identify a stash by its custom branch-name message. Evaluates
  stash-message parsing for identification.
difficulty: medium
tags:
- stash
- branch-name
- message
- recovery
