id: f010
description: Refactor multiple files
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'old code' > helpers.py
- echo 'old code' > utils.py
- git add helpers.py utils.py
- git commit -m 'Initial commit'
- rm helpers.py utils.py
- mkdir -p core
- echo 'new code' > core/helpers.py
- echo 'new code' > core/utils.py
- git add -A
prompt: Generate a concise commit message (max 50 characters) describing the changes
  in this diff. Focus on the action taken (e.g., 'Add', 'Fix', 'Update', 'Refactor').
expected: Refactor helpers into core module
scoring:
  type: llm_judge
  threshold: 0.5
purpose: Tests ability to generate a commit message for a multi-file refactor. Evaluates
  describing structural reorganization across modules.
difficulty: medium
tags:
- commit-message
- refactor
- multi-file
- structural-change
