id: f008
description: "Executable permission change"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo '#!/bin/bash' > build.sh"
  - "echo 'echo building...' >> build.sh"
  - "git add build.sh"
  - "git commit -m 'Add build script'"
  - "chmod +x build.sh"
  - "git add build.sh"
prompt: "Generate a concise commit message (max 50 characters) describing the changes in this diff. Focus on the action taken (e.g., 'Add', 'Fix', 'Update')."
expected: "Make build.sh executable"
scoring:
  type: similarity
  threshold: 0.5