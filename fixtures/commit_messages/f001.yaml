id: f001
description: "Single file added"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'Hello, World!' > hello.txt"
  - "git add hello.txt"
prompt: "Generate a concise commit message (max 50 characters) describing the changes in this diff. Focus on the action taken (e.g., 'Add', 'Fix', 'Update')."
expected: "Add hello.txt with greeting message"
scoring:
  type: similarity
  threshold: 0.5