id: f012
description: 'Multi-file: conflicts in app.py and requirements.txt simultaneously'
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- 'printf ''app = Flask(__name__)

  app.run(port=5000)'' > app.py'
- 'printf ''flask==2.0.0

  requests==2.25.0'' > requirements.txt'
- git add app.py requirements.txt
- git commit -m 'Initial app'
- git checkout -b security
- 'printf ''app = Flask(__name__)

  app.run(port=5000, debug=False)'' > app.py'
- 'printf ''flask==2.0.0

  requests==2.28.0'' > requirements.txt'
- git add app.py requirements.txt
- 'git commit -m ''Security: disable debug and update requests'''
- git checkout main
- 'printf ''app = Flask(__name__)

  app.run(port=8080)'' > app.py'
- 'printf ''flask==3.0.0

  requests==2.25.0'' > requirements.txt'
- git add app.py requirements.txt
- git commit -m 'Upgrade to Flask 3 and change port'
- git merge security
prompt: 'Resolve the merge conflicts in app.py and requirements.txt. For app.py: branch
  A disabled debug while keeping port 5000, branch B changed port to 8080 while keeping
  debug enabled. For requirements.txt: branch A updated requests to 2.28.0 keeping
  flask 2.0.0, branch B upgraded flask to 3.0.0 keeping requests 2.25.0. For app.py
  prefer disabling debug. For requirements.txt prefer keeping the older flask version
  for compatibility but take the updated requests. Provide ONLY the resolved app.py
  content (this is the primary conflict to resolve).'
expected: 'app = Flask(__name__)

  app.run(port=8080, debug=False)

  '
scoring:
  type: similarity
  threshold: 0.5
purpose: Tests ability to resolve conflicts in two interdependent files with trade-off
  decisions. Evaluates dependency-aware merging.
difficulty: hard
tags:
- merge-conflict
- multi-file
- dependency-aware
- resolution
