id: f009
description: 'Three-way: author line with three different values'
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- 'echo ''Author: John'' > author.txt'
- git add author.txt
- git commit -m 'Initial author'
- git checkout -b fullname
- 'echo ''Author: John Smith'' > author.txt'
- git add author.txt
- git commit -m 'Use full name'
- git checkout main
- git checkout -b initials
- 'echo ''Author: J. Doe'' > author.txt'
- git add author.txt
- git commit -m 'Use initials'
- git checkout main
- git merge fullname
- git merge initials
prompt: 'Resolve the merge conflict in author.txt. Three different authors were set:
  base ''Author: John'', branch A ''Author: John Smith'', branch B ''Author: J. Doe''.
  Both branches were merged into main (fullname first, then initials). Resolve the
  conflict. Provide ONLY the resolved file content.'
expected: 'Author: J. Doe'
scoring:
  type: similarity
  threshold: 0.5
purpose: Tests ability to resolve a three-way author-name conflict where all three
  values differ. Evaluates complex merge decisions.
difficulty: medium
tags:
- merge-conflict
- three-way
- author
- resolution
