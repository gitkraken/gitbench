id: f001
description: Single-line greeting conflict
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'Hello, World!' > greeting.txt
- git add greeting.txt
- git commit -m 'Initial greeting'
- git checkout -b feature
- echo 'Hello, World!!!' > greeting.txt
- git add greeting.txt
- git commit -m 'Add excitement'
- git checkout main
- echo 'Hello, Planet!' > greeting.txt
- git add greeting.txt
- git commit -m 'Update greeting'
- git merge feature
prompt: Resolve the merge conflict in greeting.txt. The base version was 'Hello, World!'.
  Branch A changed it to 'Hello, World!!!'. Branch B changed it to 'Hello, Planet!'.
  Provide ONLY the resolved file content, nothing else.
expected: Hello, Planet!!!
scoring:
  type: resolved_file_blocks
  expected_files:
    greeting.txt: |-
      Hello, Planet!!!
purpose: Tests ability to resolve a simple single-line merge conflict in a greeting
  file. Evaluates basic conflict marker comprehension.
difficulty: easy
tags:
- merge-conflict
- single-line
- basic
- resolution
