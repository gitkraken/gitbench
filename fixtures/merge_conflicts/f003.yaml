id: f003
description: Single-line status message conflict
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- 'echo ''Status: OK'' > status.txt'
- git add status.txt
- git commit -m 'Initial status'
- git checkout -b fix
- 'echo ''Status: Resolved'' > status.txt'
- git add status.txt
- git commit -m 'Fix status'
- git checkout main
- 'echo ''Status: Failed'' > status.txt'
- git add status.txt
- git commit -m 'Update status'
- git merge fix
prompt: 'Resolve the merge conflict in status.txt. The base was ''Status: OK''. Branch
  A changed it to ''Status: Resolved''. Branch B changed it to ''Status: Failed''.
  Provide ONLY the resolved file content.'
expected: 'Status: Resolved'
scoring:
  type: resolved_file_blocks
  expected_files:
    status.txt: |-
      Status: Resolved
purpose: Tests ability to resolve a status-message merge conflict. Evaluates choosing
  between contradictory status values.
difficulty: easy
tags:
- merge-conflict
- status-message
- resolution
