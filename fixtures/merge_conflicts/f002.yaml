id: f002
description: Single-line version number conflict
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'VERSION=1.0.0' > version.txt
- git add version.txt
- git commit -m 'Initial version'
- git checkout -b release
- echo 'VERSION=2.0.0' > version.txt
- git add version.txt
- git commit -m 'Bump major version'
- git checkout main
- echo 'VERSION=1.1.0' > version.txt
- git add version.txt
- git commit -m 'Bump minor version'
- git merge release
prompt: Resolve the merge conflict in version.txt. The base version was 'VERSION=1.0.0'.
  Branch A (release) changed it to 'VERSION=2.0.0'. Branch B (main) changed it to
  'VERSION=1.1.0'. Provide ONLY the resolved file content.
expected: VERSION=2.0.0
scoring:
  type: resolved_file_blocks
  expected_files:
    version.txt: |-
      VERSION=2.0.0
purpose: Tests ability to resolve a version number merge conflict. Evaluates semantic
  versioning awareness in conflict resolution.
difficulty: easy
tags:
- merge-conflict
- version-number
- semver
- resolution
