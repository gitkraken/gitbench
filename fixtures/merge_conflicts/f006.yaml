id: f006
description: 'Multi-line hunk: config block conflict'
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- "printf 'server:\n  port: 8080\n  host: localhost' > config.yaml"
- git add config.yaml
- git commit -m 'Initial config'
- git checkout -b prod
- "printf 'server:\n  port: 443\n  host: localhost' > config.yaml"
- git add config.yaml
- git commit -m 'Use HTTPS port'
- git checkout main
- "printf 'server:\n  port: 8080\n  host: 0.0.0.0' > config.yaml"
- git add config.yaml
- git commit -m 'Listen on all interfaces'
- git merge prod
prompt: 'Resolve the merge conflict in config.yaml. The base had port: 8080 and host:
  localhost. Branch A changed port to 443 (HTTPS) keeping localhost. Branch B kept
  port 8080 but changed host to 0.0.0.0. Provide ONLY the resolved file content.'
expected: "server:\n  port: 443\n  host: 0.0.0.0\n"
scoring:
  type: similarity
  threshold: 0.5
purpose: Tests ability to resolve a configuration block merge conflict with port and
  host changes. Evaluates infrastructure-merge judgment.
difficulty: medium
tags:
- merge-conflict
- config
- infrastructure
- resolution
