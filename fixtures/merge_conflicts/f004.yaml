id: f004
description: 'Multi-line hunk: address block conflict'
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- git config user.email 'test@test.com'
- 'printf ''Name: John Doe

  Email: john@example.com

  Phone: 555-1234'' > contact.txt'
- git add contact.txt
- git commit -m 'Initial contact'
- git checkout -b work
- 'printf ''Name: John Doe

  Email: john@company.com

  Phone: 555-1234'' > contact.txt'
- git add contact.txt
- git commit -m 'Use work email'
- git checkout main
- 'printf ''Name: John Doe

  Email: johndoe@personal.com

  Phone: 555-9876'' > contact.txt'
- git add contact.txt
- git commit -m 'Update contact info'
- git merge work
prompt: Resolve the merge conflict in contact.txt. The base had john@example.com and
  555-1234. Branch A kept john@example.com but updated the email to john@company.com.
  Branch B updated both to johndoe@personal.com and 555-9876. Provide ONLY the resolved
  file content with the most complete updates.
expected: 'Name: John Doe

  Email: johndoe@personal.com

  Phone: 555-9876

  '
scoring:
  type: similarity
  threshold: 0.5
purpose: Tests ability to resolve a multi-line hunk merge conflict with address/contact
  blocks. Evaluates combining partial updates from both sides.
difficulty: medium
tags:
- merge-conflict
- multi-line
- hunk
- resolution
