id: f007
description: 'Three-way: conflicting port and protocol settings in same line range'
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- 'printf ''PORT=8080

  PROTOCOL=http'' > config.txt'
- git add config.txt
- git commit -m 'Initial config'
- git checkout -b branch-a
- 'printf ''PORT=8443

  PROTOCOL=https'' > config.txt'
- git add config.txt
- git commit -m 'Use HTTPS port'
- git checkout main
- git checkout -b branch-b
- 'printf ''PORT=9090

  PROTOCOL=http'' > config.txt'
- git add config.txt
- git commit -m 'Change to non-standard port'
- git checkout main
- git merge branch-a
- git merge branch-b
prompt: 'Resolve the merge conflict in config.txt. Three different configurations
  were attempted: base PORT=8080/PROTOCOL=http, branch-a PORT=8443/PROTOCOL=https,
  branch-b PORT=9090/PROTOCOL=http. Both branches were merged into main (branch-a
  first, then branch-b). Prefer the HTTPS configuration when there is a conflict.
  Provide ONLY the resolved config.txt content.'
expected: 'PORT=8443

  PROTOCOL=https

  '
scoring:
  type: similarity
  threshold: 0.5
purpose: Tests ability to resolve a three-way merge conflict with port and protocol
  settings. Evaluates multi-dimensional conflict resolution with explicit preferences.
difficulty: hard
tags:
- merge-conflict
- three-way
- port
- protocol
- resolution
