id: f012
description: Long-running feature with many small commits
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'start' > feature.py
- git add feature.py
- git commit -m 'Initial feature'
- 'echo ''start

  line1'' > feature.py'
- git add feature.py
- 'git commit -m ''WIP: add line1'''
- 'echo ''start

  line1

  line2'' > feature.py'
- git add feature.py
- 'git commit -m ''WIP: add line2'''
- 'echo ''start

  line1

  line2

  line3'' > feature.py'
- git add feature.py
- 'git commit -m ''WIP: add line3'''
- 'echo ''start

  line1

  line2

  line3

  line4'' > feature.py'
- git add feature.py
- git commit -m 'Complete feature'
prompt: This repository has a feature built incrementally with many small commits.
  Identify all the WIP commits that should be marked as squash/fixup for a cleaner
  history. Do not include the initial or final feature anchor commit. Provide the
  commit messages.
expected: 'WIP: add line1, WIP: add line2, WIP: add line3'
scoring:
  type: commit_selection
  threshold: 1.0
purpose: Tests ability to handle a long-running feature with many small commits requiring
  reorganization. Evaluates scaling of squash analysis.
difficulty: hard
tags:
- commit-squash
- long-running
- many-commits
- scalability
- squash
