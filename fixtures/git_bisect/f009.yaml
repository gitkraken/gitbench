id: f009
description: Branching history with bad commit that breaks import - model identifies the broken import
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo '#!/bin/bash' > test.sh"
  - "echo 'grep -q \"from utils import\" main.py' >> test.sh"
  - "chmod +x test.sh"
  - "git add test.sh && git commit -m 'Initial commit'"
  - "echo 'from utils import helpers' > main.py"
  - "git add main.py && git commit -m 'add import'"
  - "echo 'import os' > main.py"
  - "git add main.py && git commit -m 'add os import - bad commit'"
  - "git checkout -b feature"
  - "echo 'from utils import helpers' > main.py"
  - "echo 'import os' >> main.py"
  - "git add main.py && git commit -m 'restore imports'"
  - "git checkout main"
  - "git merge feature"
prompt: "You are debugging a git repository. The following commit history has one bad commit that broke the build. Identify the bad commit hash (first 7 characters) or commit subject line that introduced the bug. Use the git log and test output to determine which commit is bad.\n\nYour answer should be the commit hash (e.g., 'abc1234') or the commit subject line."
expected: "add os import - bad commit"
scoring:
  type: similarity
  threshold: 0.5