id: f007
description: Branching history with bad commit on main branch - model identifies commit before feature merge
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo '#!/bin/bash' > test.sh"
  - "echo 'grep -v \"DEBUG\" src/app.js | grep -q \"production\"' >> test.sh"
  - "chmod +x test.sh"
  - "git add test.sh && git commit -m 'Initial commit'"
  - "mkdir -p src && echo 'const ENV = \"production\";' > src/app.js"
  - "git add src/app.js && git commit -m 'setup production env'"
  - "echo 'const ENV = \"development\";' > src/app.js"
  - "git add src/app.js && git commit -m 'switch to dev - bad commit'"
  - "git checkout -b feature"
  - "echo 'const ENV = \"production\";' > src/app.js"
  - "git add src/app.js && git commit -m 'restore production'"
  - "git checkout main"
  - "git merge feature"
prompt: "You are debugging a git repository. The following commit history has one bad commit that broke the build. Identify the bad commit hash (first 7 characters) or commit subject line that introduced the bug. Use the git log and test output to determine which commit is bad.\n\nYour answer should be the commit hash (e.g., 'abc1234') or the commit subject line."
expected: "switch to dev - bad commit"
scoring:
  type: similarity
  threshold: 0.5