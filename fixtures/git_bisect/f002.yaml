id: f002
description: Linear history with bad commit in the middle - model identifies middle commit as bad
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo '#!/bin/bash' > test.sh"
  - "echo 'grep \"42\" config.json' >> test.sh"
  - "chmod +x test.sh"
  - "git add test.sh"
  - "git commit -m 'Initial commit'"
  - "echo '{\"value\": 42}' > config.json"
  - "git add config.json"
  - "git commit -m 'set config value'"
  - "echo '{\"value\": 0}' > config.json"
  - "git add config.json"
  - "git commit -m 'reset config to zero - bad commit'"
  - "echo '{\"value\": 100}' > config.json"
  - "git add config.json"
  - "git commit -m 'final config'"
prompt: "You are debugging a git repository. The following commit history has one bad commit that broke the build. Identify the bad commit hash (first 7 characters) or commit subject line that introduced the bug. Use the git log and test output to determine which commit is bad.\n\nYour answer should be the commit hash (e.g., 'abc1234') or the commit subject line."
expected: "reset config to zero - bad commit"
scoring:
  type: similarity
  threshold: 0.5