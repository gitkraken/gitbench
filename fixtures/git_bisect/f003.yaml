id: f003
description: Linear history with bad commit near end - model identifies second-to-last
  commit as bad
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo '#!/bin/bash' > test.sh
- echo 'grep "ENABLED = true" app.py' >> test.sh
- chmod +x test.sh
- echo 'ENABLED = true' > app.py
- git add test.sh app.py
- git commit -m 'Initial commit'
- echo '# feature enabled by default' >> app.py
- git add app.py
- git commit -m 'enable feature'
- echo 'ENABLED = false' > app.py
- git add app.py
- git commit -m 'disable feature'
- echo '# add telemetry' >> app.py
- git add app.py
- git commit -m 'add feature telemetry'
prompt: 'You are debugging a git repository. The following commit history has one
  bad commit that broke the build. Identify the bad commit hash (first 7 characters)
  or commit subject line that introduced the bug. Use the git log and test output
  to determine which commit is bad.


  Your answer should be the commit hash (e.g., ''abc1234'') or the commit subject
  line.'
expected: disable feature
scoring:
  type: bisect_regression
  threshold: 0.5
purpose: Tests ability to identify the second-to-last commit as bad. Evaluates bisect
  near the end of a linear history.
difficulty: easy
tags:
- git-bisect
- linear-history
- near-end
