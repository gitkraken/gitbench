id: f008
description: Branching history with bad commit that removes validation - model identifies
  the bad commit
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo '#!/bin/bash' > test.sh
- echo 'grep -q "if not data" src/auth.py' >> test.sh
- chmod +x test.sh
- "mkdir -p src && echo 'def validate_input(data):\n    if not data:\n        return\
  \ False\n    return True' > src/auth.py"
- git add test.sh src/auth.py && git commit -m 'Initial commit'
- echo '# validation enabled' >> src/auth.py
- git add src/auth.py && git commit -m 'add validation function'
- 'echo ''def validate_input(data): return True'' > src/auth.py'
- git add src/auth.py && git commit -m 'remove validation logic'
- git checkout -b feature
- echo '# auth logging enabled' >> src/auth.py
- git add src/auth.py && git commit -m 'add auth logging'
- git checkout main
- git merge feature
prompt: 'You are debugging a git repository. The following commit history has one
  bad commit that broke the build. Identify the bad commit hash (first 7 characters)
  or commit subject line that introduced the bug. Use the git log and test output
  to determine which commit is bad.


  Your answer should be the commit hash (e.g., ''abc1234'') or the commit subject
  line.'
expected: remove validation logic
scoring:
  type: bisect_regression
  threshold: 0.5
purpose: Tests ability to identify a commit that removed validation logic via bisect.
  Evaluates bisect for a regression that removes safety checks.
difficulty: medium
tags:
- git-bisect
- validation
- regression
- branching
