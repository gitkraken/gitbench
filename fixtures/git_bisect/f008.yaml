id: f008
description: Branching history with bad commit that removes validation - model identifies the bad commit
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo '#!/bin/bash' > test.sh"
  - "echo 'grep -q \"validate\" src/auth.py' >> test.sh"
  - "chmod +x test.sh"
  - "git add test.sh && git commit -m 'Initial commit'"
  - "mkdir -p src && echo 'def validate_input(data): pass' > src/auth.py"
  - "git add src/auth.py && git commit -m 'add validation function'"
  - "echo '# Validation removed - bad commit' >> src/auth.py"
  - "echo 'def validate_input(data): return True' >> src/auth.py"
  - "git add src/auth.py && git commit -m 'remove validation logic - bad commit'"
  - "git checkout -b feature"
  - "echo 'def validate_input(data):\n    if not data:\n        return False\n    return True' > src/auth.py"
  - "git add src/auth.py && git commit -m 'add proper validation'"
  - "git checkout main"
  - "git merge feature"
prompt: "You are debugging a git repository. The following commit history has one bad commit that broke the build. Identify the bad commit hash (first 7 characters) or commit subject line that introduced the bug. Use the git log and test output to determine which commit is bad.\n\nYour answer should be the commit hash (e.g., 'abc1234') or the commit subject line."
expected: "remove validation logic - bad commit"
scoring:
  type: similarity
  threshold: 0.5