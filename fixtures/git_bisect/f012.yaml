id: f012
description: Bad commit changes database.py and api.py - model identifies the multi-file bad commit
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo '#!/bin/bash' > test.sh"
  - "echo 'grep -q \"localhost\" database.py && grep -q \"localhost\" api.py' >> test.sh"
  - "chmod +x test.sh"
  - "git add test.sh && git commit -m 'Initial commit'"
  - "mkdir -p src && echo 'DB_HOST = \"localhost\"' > src/database.py && echo 'API_BASE = \"http://localhost:8000\"' > src/api.py"
  - "git add src/database.py src/api.py && git commit -m 'configure localhost'"
  - "echo 'DB_HOST = \"production.db.com\"' > src/database.py && echo 'API_BASE = \"http://production.api.com\"' > src/api.py"
  - "git add src/database.py src/api.py && git commit -m 'switch to prod - bad commit'"
  - "echo 'DB_HOST = \"localhost\"' > src/database.py && echo 'API_BASE = \"http://localhost:8000\"' > src/api.py"
  - "git add src/database.py src/api.py && git commit -m 'revert to localhost'"
  - "echo 'DB_PORT = 5432' >> src/database.py"
  - "git add src/database.py && git commit -m 'add port config'"
prompt: "You are debugging a git repository. The following commit history has one bad commit that broke the build. Identify the bad commit hash (first 7 characters) or commit subject line that introduced the bug. Use the git log and test output to determine which commit is bad.\n\nYour answer should be the commit hash (e.g., 'abc1234') or the commit subject line."
expected: "switch to prod - bad commit"
scoring:
  type: similarity
  threshold: 0.5