id: f012
description: Bad commit changes database.py and api.py - model identifies the multi-file
  bad commit
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo '#!/bin/bash' > test.sh
- echo 'grep -q "localhost" src/database.py && grep -q "localhost" src/api.py' >>
  test.sh
- chmod +x test.sh
- mkdir -p src && echo 'DB_HOST = "localhost"' > src/database.py && echo 'API_BASE
  = "http://localhost:8000"' > src/api.py
- git add test.sh src/database.py src/api.py && git commit -m 'Initial commit'
- echo 'DB_POOL = 2' >> src/database.py
- git add src/database.py src/api.py && git commit -m 'configure localhost'
- echo 'DB_HOST = "production.db.com"' > src/database.py && echo 'API_BASE = "http://production.api.com"'
  > src/api.py
- git add src/database.py src/api.py && git commit -m 'switch to prod'
- echo 'DB_POOL = 5' >> src/database.py
- git add src/database.py && git commit -m 'add pool config'
- echo 'DB_PORT = 5432' >> src/database.py
- git add src/database.py && git commit -m 'add port config'
prompt: 'You are debugging a git repository. The following commit history has one
  bad commit that broke the build. Identify the bad commit hash (first 7 characters)
  or commit subject line that introduced the bug. Use the git log and test output
  to determine which commit is bad.


  Your answer should be the commit hash (e.g., ''abc1234'') or the commit subject
  line.'
expected: switch to prod
scoring:
  type: bisect_regression
  threshold: 0.5
purpose: Tests ability to identify a multi-file bad commit (database.py + api.py)
  via bisect. Evaluates bisect for backend multi-file regressions.
difficulty: hard
tags:
- git-bisect
- multi-file
- backend
- branching
