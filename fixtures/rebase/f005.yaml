id: f005
description: Multi-line function body conflict
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- "printf 'def greet(name):\n    print(\"Hello\")\n    return True' > greet.py"
- git add greet.py
- git commit -m 'Initial greet'
- git checkout -b feature
- "printf 'def greet(name):\n    print(f\"Hello, {name}\")\n    return True' > greet.py"
- git add greet.py
- git commit -m 'Add name parameter'
- git checkout main
- "printf 'def greet(name):\n    print(\"Hi there\")\n    return False' > greet.py"
- git add greet.py
- git commit -m 'Change greeting'
- git rebase feature
prompt: Resolve the rebase conflict in greet.py. The base was a simple greet with
  print("Hello"). Branch being rebased added f-string formatting with the name parameter.
  Main branch changed the greeting text to "Hi there" and changed return to False.
  Resolve by taking main branch's greeting text and False return rather than the
  rebased branch's name-aware greeting. Provide ONLY the resolved file content.
expected: "def greet(name):\n    print(\"Hi there\")\n    return False\n"
scoring:
  type: resolved_file_blocks
  expected_files:
    greet.py: |
      def greet(name):
          print("Hi there")
          return False
purpose: Tests ability to resolve a function-body conflict during rebase. Evaluates
  semantic merging of code with rebase direction awareness.
difficulty: medium
tags:
- rebase
- function-body
- code-merge
- conflict-resolution
