id: f002
description: Single-line version number conflict
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- echo 'VERSION=1.0.0' > version.txt
- git add version.txt
- git commit -m 'Initial version'
- git checkout -b release
- echo 'VERSION=2.0.0' > version.txt
- git add version.txt
- git commit -m 'Bump major version'
- git checkout main
- echo 'VERSION=1.1.0' > version.txt
- git add version.txt
- git commit -m 'Bump minor version'
- git rebase release
prompt: Resolve the rebase conflict in version.txt. The base version was 'VERSION=1.0.0'.
  The upstream release branch set it to 'VERSION=2.0.0'. The current branch being
  rebased (main) set it to 'VERSION=1.1.0'. Keep the current branch value. Provide
  ONLY the resolved file content.
expected: VERSION=1.1.0
scoring:
  type: resolved_file_blocks
  expected_files:
    version.txt: |-
      VERSION=1.1.0
purpose: Tests ability to resolve a version number conflict during rebase. Evaluates
  handling of semantic version clashes with rebase polarity.
difficulty: easy
tags:
- rebase
- version-number
- conflict-resolution
