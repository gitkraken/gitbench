id: f002
description: "Single-line version number conflict"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'VERSION=1.0.0' > version.txt"
  - "git add version.txt"
  - "git commit -m 'Initial version'"
  - "git checkout -b release"
  - "echo 'VERSION=2.0.0' > version.txt"
  - "git add version.txt"
  - "git commit -m 'Bump major version'"
  - "git checkout main"
  - "echo 'VERSION=1.1.0' > version.txt"
  - "git add version.txt"
  - "git commit -m 'Bump minor version'"
  - "git rebase release"
prompt: "Resolve the rebase conflict in version.txt. The base version was 'VERSION=1.0.0'. Branch being rebased (release) set it to 'VERSION=2.0.0'. Main branch set it to 'VERSION=1.1.0'. Provide ONLY the resolved file content."
expected: "VERSION=1.1.0"
scoring:
  type: similarity
  threshold: 0.5