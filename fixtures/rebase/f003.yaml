id: f003
description: "Single-line status message conflict"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'Status: OK' > status.txt"
  - "git add status.txt"
  - "git commit -m 'Initial status'"
  - "git checkout -b fix"
  - "echo 'Status: Resolved' > status.txt"
  - "git add status.txt"
  - "git commit -m 'Fix status'"
  - "git checkout main"
  - "echo 'Status: Failed' > status.txt"
  - "git add status.txt"
  - "git commit -m 'Update status'"
  - "git rebase fix"
prompt: "Resolve the rebase conflict in status.txt. The base was 'Status: OK'. Branch being rebased changed it to 'Status: Resolved'. Main branch changed it to 'Status: Failed'. Provide ONLY the resolved file content."
expected: "Status: Failed"
scoring:
  type: similarity
  threshold: 0.5