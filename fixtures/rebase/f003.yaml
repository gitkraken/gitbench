id: f003
description: Single-line status message conflict
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- 'echo ''Status: OK'' > status.txt'
- git add status.txt
- git commit -m 'Initial status'
- git checkout -b fix
- 'echo ''Status: Resolved'' > status.txt'
- git add status.txt
- git commit -m 'Fix status'
- git checkout main
- 'echo ''Status: Failed'' > status.txt'
- git add status.txt
- git commit -m 'Update status'
- git rebase fix
prompt: 'Resolve the rebase conflict in status.txt. The base was ''Status: OK''. The
  upstream fix branch changed it to ''Status: Resolved''. The current branch being
  rebased (main) changed it to ''Status: Failed''. Keep the current branch value.
  Provide ONLY the resolved file content.'
expected: 'Status: Failed'
scoring:
  type: resolved_file_blocks
  expected_files:
    status.txt: |-
      Status: Failed
purpose: Tests ability to resolve a status-message conflict during rebase. Evaluates
  choosing between contradictory values in rebase context.
difficulty: easy
tags:
- rebase
- status-message
- conflict-resolution
