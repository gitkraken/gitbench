id: f004
description: Multi-line address block conflict
setup:
- git init
- git config user.email 'test@test.com'
- git config user.name 'Test User'
- 'printf ''Name: John Doe

  Email: john@example.com

  Phone: 555-1234'' > contact.txt'
- git add contact.txt
- git commit -m 'Initial contact'
- git checkout -b work
- 'printf ''Name: John Doe

  Email: john@company.com

  Phone: 555-1234'' > contact.txt'
- git add contact.txt
- git commit -m 'Use work email'
- git checkout main
- 'printf ''Name: John Doe

  Email: johndoe@personal.com

  Phone: 555-9876'' > contact.txt'
- git add contact.txt
- git commit -m 'Update contact info'
- git rebase work
prompt: Resolve the rebase conflict in contact.txt. The base had john@example.com
  and 555-1234. Branch being rebased kept john@example.com but updated the email to
  john@company.com. Main branch updated both to johndoe@personal.com and 555-9876.
  Provide ONLY the resolved file content with the most complete updates.
expected: 'Name: John Doe

  Email: johndoe@personal.com

  Phone: 555-9876

  '
scoring:
  type: resolved_file_blocks
  expected_files:
    contact.txt: |
      Name: John Doe
      Email: johndoe@personal.com
      Phone: 555-9876
purpose: Tests ability to resolve a multi-line address block conflict during rebase.
  Evaluates combining partial updates with correct polarity.
difficulty: medium
tags:
- rebase
- multi-line
- hunk
- conflict-resolution
